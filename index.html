<!DOCTYPE html>
<html lang="pt-BR">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Tarefas — Point 43</title>
<style>
  * { box-sizing: border-box; margin: 0; padding: 0; }

  body {
    font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif;
    background: #0f0f0f;
    color: #f0f0f0;
    min-height: 100vh;
    font-size: 18px;
  }

  /* ── TELA DE SELEÇÃO ── */
  #tela-selecao {
    display: flex;
    flex-direction: column;
    align-items: center;
    justify-content: center;
    min-height: 100vh;
    padding: 2rem;
  }

  .logo {
    font-size: 13px;
    letter-spacing: 0.15em;
    color: #c9a84c;
    font-weight: 600;
    margin-bottom: 8px;
  }

  .logo-titulo {
    font-size: 22px;
    font-weight: 700;
    color: #fff;
    margin-bottom: 2rem;
  }

  .grid-usuarios {
    display: grid;
    grid-template-columns: repeat(auto-fit, minmax(140px, 1fr));
    gap: 12px;
    max-width: 600px;
    width: 100%;
  }

  .btn-usuario {
    background: #1a1a1a;
    border: 1px solid #2a2a2a;
    border-radius: 12px;
    padding: 1.2rem 1rem;
    cursor: pointer;
    transition: all 0.15s;
    text-align: center;
    color: #f0f0f0;
  }

  .btn-usuario:hover {
    border-color: #c9a84c;
    background: #1f1c14;
  }

  .btn-usuario .avatar {
    width: 44px;
    height: 44px;
    border-radius: 50%;
    background: #c9a84c22;
    border: 1.5px solid #c9a84c55;
    display: flex;
    align-items: center;
    justify-content: center;
    font-weight: 700;
    font-size: 16px;
    color: #c9a84c;
    margin: 0 auto 10px;
  }

  .btn-usuario .nome { font-size: 16px; font-weight: 500; }
  .btn-usuario .cargo { font-size: 13px; color: #666; margin-top: 2px; }

  /* ── APP PRINCIPAL ── */
  #app { display: none; }

  header {
    background: #141414;
    border-bottom: 1px solid #222;
    padding: 0 1.5rem;
    display: flex;
    align-items: center;
    justify-content: space-between;
    height: 56px;
    position: sticky;
    top: 0;
    z-index: 10;
  }

  .header-esq { display: flex; align-items: center; gap: 12px; }

  .header-avatar {
    width: 32px; height: 32px;
    border-radius: 50%;
    background: #c9a84c22;
    border: 1.5px solid #c9a84c;
    display: flex; align-items: center; justify-content: center;
    font-weight: 700; font-size: 12px; color: #c9a84c;
  }

  .header-nome { font-size: 16px; font-weight: 500; }
  .header-cargo { font-size: 13px; color: #666; }

  .btn-trocar {
    background: none; border: 1px solid #2a2a2a;
    color: #888; font-size: 14px;
    padding: 6px 12px; border-radius: 6px; cursor: pointer;
  }
  .btn-trocar:hover { color: #f0f0f0; border-color: #444; }

  /* ── TABS ── */
  .tabs {
    display: flex;
    gap: 4px;
    padding: 1rem 1.5rem 0;
    border-bottom: 1px solid #222;
    background: #141414;
  }

  .tab {
    padding: 8px 16px;
    font-size: 15px;
    color: #666;
    cursor: pointer;
    border-bottom: 2px solid transparent;
    transition: all 0.15s;
    border-radius: 4px 4px 0 0;
  }

  .tab:hover { color: #f0f0f0; }
  .tab.ativo { color: #c9a84c; border-bottom-color: #c9a84c; }

  /* ── CONTEÚDO ── */
  .conteudo { padding: 1.5rem; max-width: 900px; margin: 0 auto; }

  /* ── BOTÃO NOVA TAREFA ── */
  .btn-nova {
    background: #c9a84c;
    color: #000;
    border: none;
    padding: 12px 22px;
    border-radius: 8px;
    font-size: 15px;
    font-weight: 600;
    cursor: pointer;
    margin-bottom: 1.5rem;
    display: inline-flex;
    align-items: center;
    gap: 6px;
  }
  .btn-nova:hover { background: #d4b05e; }

  /* ── FILTROS ── */
  .filtros {
    display: flex;
    gap: 8px;
    margin-bottom: 1.25rem;
    flex-wrap: wrap;
  }

  .filtro-btn {
    background: #1a1a1a;
    border: 1px solid #2a2a2a;
    color: #888;
    padding: 6px 14px;
    border-radius: 20px;
    font-size: 14px;
    cursor: pointer;
    transition: all 0.15s;
  }
  .filtro-btn:hover { border-color: #444; color: #f0f0f0; }
  .filtro-btn.ativo { background: #1f1c14; border-color: #c9a84c; color: #c9a84c; }

  /* ── CARDS DE TAREFA ── */
  .lista-tarefas { display: flex; flex-direction: column; gap: 8px; }

  .tarefa-card {
    background: #1a1a1a;
    border: 1px solid #2a2a2a;
    border-radius: 10px;
    padding: 14px 16px;
    display: flex;
    align-items: flex-start;
    gap: 12px;
    transition: border-color 0.15s;
  }

  .tarefa-card:hover { border-color: #333; }
  .tarefa-card.atrasada { border-left: 3px solid #e24b4a; }
  .tarefa-card.concluida { opacity: 0.45; }
  .tarefa-card.concluida:hover { opacity: 0.75; }
  .tarefa-card.concluida .btn-excluir { opacity: 1; color: #666; }
  .tarefa-card.em-andamento { border-left: 3px solid #c9a84c; }
  .tarefa-card.aguardando { border-left: 3px solid #7777cc; background: #1a1a2a; }
  .tarefa-card.devolvida { border-left: 3px solid #e2874a; background: #1e1a14; }

  .tarefa-check {
    width: 20px; height: 20px; min-width: 20px;
    border-radius: 50%;
    border: 1.5px solid #444;
    cursor: pointer;
    display: flex; align-items: center; justify-content: center;
    margin-top: 1px;
    transition: all 0.15s;
  }
  .tarefa-check:hover { border-color: #c9a84c; }
  .tarefa-check.concluida { background: #c9a84c; border-color: #c9a84c; }
  .tarefa-check.concluida::after { content: '✓'; font-size: 11px; color: #000; font-weight: 700; }
  .tarefa-check.em-andamento { border-color: #c9a84c; }
  .tarefa-check.em-andamento::after { content: '▶'; font-size: 9px; color: #c9a84c; }

  .tarefa-corpo { flex: 1; min-width: 0; }

  .tarefa-titulo {
    font-size: 16px;
    font-weight: 500;
    color: #f0f0f0;
    margin-bottom: 6px;
    line-height: 1.4;
  }

  .tarefa-meta {
    display: flex;
    align-items: center;
    gap: 10px;
    flex-wrap: wrap;
  }

  .tag {
    font-size: 13px;
    padding: 3px 9px;
    border-radius: 20px;
    font-weight: 500;
  }

  .tag-data { background: #1e2a1e; color: #5a9e5a; }
  .tag-data.atrasada { background: #2a1e1e; color: #e24b4a; }
  .tag-data.hoje { background: #2a231a; color: #c9a84c; }
  .tag-criado { background: #1e1e2a; color: #7777cc; }
  .tag-responsavel { background: #1e2a2a; color: #5a9e9e; }
  .tag-aguardando { background: #1e1e2a; color: #9999ee; font-weight: 600; }
  .tag-devolvida { background: #2a1e10; color: #e2874a; font-weight: 600; }

  .btn-aceitar {
    background: #1e2a1e; border: 1px solid #5a9e5a;
    color: #5a9e5a; font-size: 13px;
    padding: 4px 12px; border-radius: 4px; cursor: pointer;
  }
  .btn-aceitar:hover { background: #5a9e5a; color: #000; }

  .btn-recusar {
    background: none; border: 1px solid #444;
    color: #888; font-size: 13px;
    padding: 4px 12px; border-radius: 4px; cursor: pointer;
  }
  .btn-recusar:hover { border-color: #e24b4a; color: #e24b4a; }

  .badge-notif {
    background: #7777cc; color: #fff;
    font-size: 11px; font-weight: 700;
    padding: 1px 6px; border-radius: 10px;
    margin-left: 4px;
  }

  .tarefa-status-btn {
    background: none;
    border: 1px solid #2a2a2a;
    color: #666;
    font-size: 13px;
    padding: 4px 10px;
    border-radius: 4px;
    cursor: pointer;
    transition: all 0.15s;
  }
  .tarefa-status-btn:hover { border-color: #c9a84c; color: #c9a84c; }

  .btn-excluir {
    background: none; border: none;
    color: #666; font-size: 18px;
    cursor: pointer; padding: 2px 6px;
    border-radius: 4px;
    transition: color 0.15s;
  }
  .btn-excluir:hover { color: #e24b4a; }

  .btn-limpar {
    background: none; border: 1px solid #333;
    color: #666; font-size: 13px;
    padding: 6px 14px; border-radius: 6px;
    cursor: pointer; margin-left: 8px;
    transition: all 0.15s;
  }
  .btn-limpar:hover { border-color: #e24b4a; color: #e24b4a; }

  .btn-editar {
    background: none; border: none;
    color: #c9a84c; font-size: 16px;
    cursor: pointer; padding: 2px 6px;
    border-radius: 4px;
    transition: color 0.15s;
    opacity: 0.6;
  }
  .btn-editar:hover { opacity: 1; }

  .vazio {
    text-align: center;
    padding: 3rem;
    color: #444;
    font-size: 14px;
  }

  /* ── SEÇÃO VISÃO GERAL ── */
  .pessoa-secao { margin-bottom: 2rem; }

  .pessoa-header {
    display: flex;
    align-items: center;
    gap: 10px;
    margin-bottom: 10px;
    cursor: pointer;
  }

  .pessoa-avatar-sm {
    width: 28px; height: 28px;
    border-radius: 50%;
    background: #c9a84c22;
    border: 1px solid #c9a84c55;
    display: flex; align-items: center; justify-content: center;
    font-size: 11px; font-weight: 700; color: #c9a84c;
  }

  .pessoa-nome-header { font-size: 16px; font-weight: 600; color: #f0f0f0; }
  .badge-contagem {
    font-size: 13px; background: #2a2a2a;
    color: #888; padding: 2px 8px;
    border-radius: 20px;
  }
  .badge-atrasada { background: #2a1e1e; color: #e24b4a; }

  /* ── MODAL ── */
  .overlay {
    display: none;
    position: fixed; inset: 0;
    background: #000000bb;
    z-index: 100;
    align-items: center;
    justify-content: center;
    padding: 1rem;
  }
  .overlay.aberto { display: flex; }

  .modal {
    background: #1a1a1a;
    border: 1px solid #2a2a2a;
    border-radius: 16px;
    padding: 1.5rem;
    width: 100%;
    max-width: 480px;
  }

  .modal h2 { font-size: 18px; font-weight: 600; margin-bottom: 1.25rem; }

  .campo { margin-bottom: 1rem; }
  .campo label { font-size: 14px; color: #888; display: block; margin-bottom: 6px; }

  .campo input, .campo select, .campo textarea {
    width: 100%;
    background: #111;
    border: 1px solid #2a2a2a;
    border-radius: 8px;
    color: #f0f0f0;
    font-size: 16px;
    padding: 10px 12px;
    outline: none;
    font-family: inherit;
  }

  .campo input:focus, .campo select:focus, .campo textarea:focus {
    border-color: #c9a84c;
  }

  .campo select option { background: #1a1a1a; }
  .campo textarea { resize: vertical; min-height: 80px; }

  .modal-btns { display: flex; gap: 8px; justify-content: flex-end; margin-top: 1.25rem; }

  .btn-cancelar {
    background: none; border: 1px solid #2a2a2a;
    color: #888; padding: 10px 20px;
    border-radius: 8px; font-size: 15px; cursor: pointer;
  }
  .btn-cancelar:hover { border-color: #444; color: #f0f0f0; }

  .btn-salvar {
    background: #c9a84c; color: #000;
    border: none; padding: 10px 20px;
    border-radius: 8px; font-size: 15px;
    font-weight: 600; cursor: pointer;
  }
  .btn-salvar:hover { background: #d4b05e; }

  /* ── ROTINA ── */
  .rotina-header {
    display: flex; align-items: center;
    justify-content: space-between;
    margin-bottom: 1.25rem;
  }
  .rotina-progresso {
    font-size: 14px; color: #888;
  }
  .rotina-barra-wrap {
    background: #222; border-radius: 4px;
    height: 6px; flex: 1; margin: 0 12px;
    overflow: hidden;
  }
  .rotina-barra {
    height: 100%; background: #c9a84c;
    border-radius: 4px; transition: width 0.3s;
  }
  .rotina-item {
    display: flex; align-items: flex-start;
    gap: 12px; padding: 12px 16px;
    background: #1a1a1a; border: 1px solid #2a2a2a;
    border-radius: 10px; margin-bottom: 8px;
    cursor: pointer; transition: all 0.15s;
    user-select: none;
  }
  .rotina-item:hover { border-color: #333; }
  .rotina-item.drag-over { border-color: #c9a84c; background: #1e1a0f; }
  .rotina-item.feito { opacity: 0.45; }
  .drag-handle { color: #444; font-size: 16px; cursor: grab; padding: 0 6px 0 0; user-select: none; }
  .drag-handle:active { cursor: grabbing; }
  .rotina-grupo { border: 1px solid #2a2a2a; border-radius: 8px; margin-bottom: 8px; overflow: hidden; }
  .rotina-grupo-header { display: flex; align-items: center; gap: 10px; padding: 10px 14px; cursor: pointer; list-style: none; background: #161616; }
  .rotina-grupo-header::-webkit-details-marker { display: none; }
  .rotina-grupo-nome { font-size: 13px; font-weight: 600; color: #c9a84c; flex: 1; }
  .rotina-grupo-pct { font-size: 12px; color: #555; }
  .rotina-grupo-pct.completo { color: #5a9e5a; }
  .rotina-grupo .rotina-item { border-radius: 0; border-left: none; border-right: none; border-top: none; border-bottom: 1px solid #1a1a1a; margin-bottom: 0; }
  .rotina-grupo .rotina-item:last-child { border-bottom: none; }
  .rotina-item.feito:hover { opacity: 0.65; }
  .rotina-check {
    width: 22px; height: 22px; min-width: 22px;
    border-radius: 6px; border: 1.5px solid #444;
    display: flex; align-items: center; justify-content: center;
    margin-top: 1px; transition: all 0.15s;
    font-size: 13px; font-weight: 700; color: #000;
  }
  .rotina-item.feito .rotina-check {
    background: #c9a84c; border-color: #c9a84c;
  }
  .rotina-item.feito .rotina-check::after { content: '✓'; }
  .rotina-desc { font-size: 16px; line-height: 1.4; color: #f0f0f0; flex: 1; }
  .rotina-item.feito .rotina-desc { text-decoration: line-through; color: #666; }
  .rotina-periodo { font-size: 12px; color: #555; margin-top: 3px; }

  .rotina-pessoa { margin-bottom: 2rem; }
  .rotina-pessoa-header {
    display: flex; align-items: center; gap: 10px;
    margin-bottom: 10px;
  }
  .rotina-pessoa-nome { font-size: 16px; font-weight: 600; }
  .rotina-pct {
    font-size: 13px; padding: 2px 8px;
    border-radius: 20px; background: #2a2a2a; color: #888;
  }
  .rotina-pct.completo { background: #1e2a1e; color: #5a9e5a; }

  /* ── RESPONSIVO ── */
  @media (max-width: 480px) {
    .grid-usuarios { grid-template-columns: repeat(2, 1fr); }
    .conteudo { padding: 1rem; }
    .tabs { padding: 0.75rem 1rem 0; overflow-x: auto; }
  }
</style>
</head>
<body>

<!-- TELA SELEÇÃO -->
<div id="tela-selecao">
  <div class="logo">POINT 43</div>
  <div class="logo-titulo">Gestão de Tarefas</div>
  <div class="grid-usuarios" id="grid-usuarios"></div>
</div>

<!-- APP -->
<div id="app">
  <header>
    <div class="header-esq">
      <div class="header-avatar" id="h-avatar"></div>
      <div>
        <div class="header-nome" id="h-nome"></div>
        <div class="header-cargo" id="h-cargo"></div>
      </div>
    </div>
    <button class="btn-trocar" onclick="trocarUsuario()">← Trocar</button>
  </header>

  <div class="tabs" id="tabs"></div>

  <div class="conteudo" id="conteudo"></div>
</div>

<!-- MODAL ITEM DE ROTINA -->
<div class="overlay" id="overlay-rotina">
  <div class="modal">
    <h2 id="modal-rotina-titulo">Item de Rotina</h2>
    <div class="campo">
      <label>Descrição *</label>
      <textarea id="r-descricao" placeholder="O que precisa ser feito?"></textarea>
    </div>
    <div class="campo">
      <label>Horário / Período</label>
      <input type="text" id="r-periodo" placeholder="Ex: 08h–11h, Dia todo, A partir das 11h">
    </div>
    <div class="campo">
      <label>Grupo <span style="color:#555;font-size:12px">(opcional — agrupa itens relacionados)</span></label>
      <input type="text" id="r-grupo" placeholder="Ex: Cancelamentos, Wellhub, FitzAp">
    </div>
    <div class="campo" id="r-campo-usuario" style="display:none">
      <label>Pessoa</label>
      <select id="r-usuario"></select>
    </div>
    <div class="modal-btns">
      <button class="btn-cancelar" onclick="fecharModalRotina()">Cancelar</button>
      <button class="btn-salvar" onclick="salvarItemRotina()">Salvar</button>
    </div>
  </div>
</div>

<!-- MODAL NOVA TAREFA -->
<div class="overlay" id="overlay">
  <div class="modal">
    <h2 id="modal-titulo">Nova Tarefa</h2>
    <div class="campo">
      <label>Descrição *</label>
      <textarea id="f-descricao" placeholder="O que precisa ser feito?"></textarea>
    </div>
    <div class="campo">
      <label>Responsável *</label>
      <select id="f-responsavel"></select>
    </div>
    <div class="campo">
      <label>Data de entrega *</label>
      <input type="date" id="f-data">
    </div>
    <div class="modal-btns">
      <button class="btn-cancelar" onclick="fecharModal()">Cancelar</button>
      <button class="btn-salvar" onclick="salvarTarefa()">Salvar</button>
    </div>
  </div>
</div>

<script src="https://www.gstatic.com/firebasejs/9.23.0/firebase-app-compat.js"></script>

const USUARIOS = [
  { id: 'gustavo',  nome: 'Gustavo',  cargo: 'CEO',       gestor: true },
  { id: 'mateus',   nome: 'Mateus',   cargo: 'COO',       gestor: true },
  { id: 'bene',     nome: 'Bene',     cargo: 'CFO',       gestor: true },
  { id: 'lucas',    nome: 'Lucas',    cargo: 'Expansão',  gestor: false },
  { id: 'emilly',   nome: 'Emilly',   cargo: 'Backoffice',gestor: false },
  { id: 'luana',    nome: 'Luana',    cargo: 'Backoffice',gestor: false },
  { id: 'julia',    nome: 'Júlia',    cargo: 'Backoffice',gestor: false },
  { id: 'raquel',   nome: 'Raquel',   cargo: 'Marketing', gestor: false },
];

let usuarioAtual = null;
let tarefas = {};
let rotinaHoje = {};
let rotinasConfig = {};
let tabAtiva = 'minhas';
let filtroStatus = 'todas';
let editandoRotinaId = null;
let editandoRotinaUser = null;
let dataRotina = hoje();

function hoje() {
  return new Date().toISOString().split('T')[0];
}

function iniciais(nome) {
  return nome.split(' ').map(p => p[0]).join('').slice(0,2).toUpperCase();
}

function usuario(id) {
  return USUARIOS.find(u => u.id === id);
}

// ── SELEÇÃO DE USUÁRIO ──
function renderSelecao() {
  const grid = document.getElementById('grid-usuarios');
  grid.innerHTML = USUARIOS.map(u => `
    <div class="btn-usuario" onclick="entrar('${u.id}')">
      <div class="avatar">${iniciais(u.nome)}</div>
      <div class="nome">${u.nome}</div>
      <div class="cargo">${u.cargo}</div>
    </div>
  `).join('');
}

function entrar(id) {
  usuarioAtual = id;
  localStorage.setItem('p43_usuario', id);
  document.getElementById('tela-selecao').style.display = 'none';
  document.getElementById('app').style.display = 'block';
  const u = usuario(id);
  document.getElementById('h-avatar').textContent = iniciais(u.nome);
  document.getElementById('h-nome').textContent = u.nome;
  document.getElementById('h-cargo').textContent = u.cargo;
  renderTabs();
  escutarTarefas();
}

function trocarUsuario() {
  localStorage.removeItem('p43_usuario');
  usuarioAtual = null;
  document.getElementById('app').style.display = 'none';
  document.getElementById('tela-selecao').style.display = 'flex';
}

// ── TABS ──
function contarAguardando() {
  return Object.values(tarefas).filter(t =>
    t.responsavel === usuarioAtual && t.status === 'aguardando-aceite'
  ).length;
}

function renderTabs() {
  const u = usuario(usuarioAtual);
  const pendentes = contarAguardando();
  const badge = pendentes > 0 ? `<span class="badge-notif">${pendentes}</span>` : '';
  const temRotina = u.gestor || (rotinasConfig[usuarioAtual] && Object.keys(rotinasConfig[usuarioAtual]).length > 0);
  const tabs = [
    { id: 'minhas', label: `Minhas tarefas${badge}` },
    ...(temRotina || u.gestor ? [{ id: 'rotina', label: 'Rotina diária' }] : []),
    { id: 'geral', label: 'Visão geral' },
  ];
  document.getElementById('tabs').innerHTML = tabs.map(t => `
    <div class="tab ${tabAtiva === t.id ? 'ativo' : ''}" onclick="mudarTab('${t.id}')">${t.label}</div>
  `).join('');
}

function mudarTab(id) {
  tabAtiva = id;
  renderTabs();
  renderConteudo();
}

// ── FIREBASE ──
function mudarDataRotina(novaData) {
  REF_ROTINA.child(dataRotina).off();
  dataRotina = novaData;
  REF_ROTINA.child(dataRotina).on('value', snap => {
    rotinaHoje = snap.val() || {};
    if (tabAtiva === 'rotina') renderConteudo();
  });
  if (tabAtiva === 'rotina') renderConteudo();
}

function navegarData(delta) {
  const d = new Date(dataRotina + 'T12:00:00');
  d.setDate(d.getDate() + delta);
  const nova = d.toISOString().slice(0, 10);
  if (nova > hoje()) return;
  mudarDataRotina(nova);
}

function escutarTarefas() {
  REF.on('value', snap => {
    tarefas = snap.val() || {};
    renderConteudo();
  });
  REF_ROTINA.child(dataRotina).on('value', snap => {
    rotinaHoje = snap.val() || {};
    if (tabAtiva === 'rotina') renderConteudo();
  });
  REF_CONFIG.on('value', snap => {
    rotinasConfig = snap.val() || {};
    if (!rotinasConfig.emilly) {
      ROTINAS_SEED.emilly.forEach(item => REF_CONFIG.child('emilly').push(item));
    }
    if (!rotinasConfig.julia) {
      ROTINAS_SEED.julia.forEach(item => REF_CONFIG.child('julia').push(item));
    }
    if (!rotinasConfig.luana) {
      ROTINAS_SEED.luana.forEach(item => REF_CONFIG.child('luana').push(item));
    }
    renderTabs();
    if (tabAtiva === 'rotina') renderConteudo();
  });
}

// ── RENDERIZAÇÃO ──
function renderConteudo() {
  if (tabAtiva === 'minhas') renderMinhas();
  else if (tabAtiva === 'rotina') renderRotina();
  else renderGeral();
}

function renderMinhas() {
  // tarefas onde sou responsável OU que me foram devolvidas (criadoPor = eu, status devolvida)
  const minhas = Object.entries(tarefas)
    .map(([id, t]) => ({ id, ...t }))
    .filter(t => t.responsavel === usuarioAtual || (t.criadoPor === usuarioAtual && t.status === 'devolvida'));

  // deduplicar (caso seja responsável E criador)
  const vistas = new Set();
  const todas = minhas.filter(t => { if (vistas.has(t.id)) return false; vistas.add(t.id); return true; });

  let filtradas = todas;
  if (filtroStatus === 'pendentes')   filtradas = todas.filter(t => !['concluida','aguardando-aceite'].includes(t.status));
  if (filtroStatus === 'andamento')   filtradas = todas.filter(t => t.status === 'em-andamento');
  if (filtroStatus === 'atrasadas')   filtradas = todas.filter(t => isAtrasada(t));
  if (filtroStatus === 'concluidas')  filtradas = todas.filter(t => t.status === 'concluida');
  if (filtroStatus === 'aguardando')  filtradas = todas.filter(t => t.status === 'aguardando-aceite');
  if (filtroStatus === 'devolvidas')  filtradas = todas.filter(t => t.status === 'devolvida');

  filtradas.sort((a, b) => {
    const ordem = { 'aguardando-aceite': 0, 'devolvida': 1, 'a-fazer': 2, 'em-andamento': 3, 'concluida': 4 };
    const oa = ordem[a.status] ?? 2;
    const ob = ordem[b.status] ?? 2;
    if (oa !== ob) return oa - ob;
    return new Date(a.data) - new Date(b.data);
  });

  const aguardando = todas.filter(t => t.status === 'aguardando-aceite').length;
  const devolvidas = todas.filter(t => t.status === 'devolvida').length;
  const atrasadas = todas.filter(t => isAtrasada(t) && !['concluida','aguardando-aceite'].includes(t.status)).length;

  document.getElementById('conteudo').innerHTML = `
    <button class="btn-nova" onclick="abrirModal()">+ Nova tarefa</button>
    ${usuarioAtual === 'gustavo' && todas.filter(t => t.status === 'concluida').length > 0 ? `<button class="btn-limpar" onclick="limparConcluidas()">🗑 Limpar concluídas</button>` : ''}
    <div class="filtros">
      <div class="filtro-btn ${filtroStatus==='todas'?'ativo':''}" onclick="setFiltro('todas')">Todas (${todas.length})</div>
      ${aguardando > 0 ? `<div class="filtro-btn ${filtroStatus==='aguardando'?'ativo':''}" onclick="setFiltro('aguardando')" style="color:#9999ee;border-color:#7777cc55">⏳ Aguardando (${aguardando})</div>` : ''}
      ${devolvidas > 0 ? `<div class="filtro-btn ${filtroStatus==='devolvidas'?'ativo':''}" onclick="setFiltro('devolvidas')" style="color:#e2874a;border-color:#e2874a55">↩ Devolvidas (${devolvidas})</div>` : ''}
      <div class="filtro-btn ${filtroStatus==='pendentes'?'ativo':''}" onclick="setFiltro('pendentes')">Pendentes</div>
      <div class="filtro-btn ${filtroStatus==='andamento'?'ativo':''}" onclick="setFiltro('andamento')">Em andamento</div>
      ${atrasadas > 0 ? `<div class="filtro-btn ${filtroStatus==='atrasadas'?'ativo':''}" onclick="setFiltro('atrasadas')" style="color:#e24b4a;border-color:#e24b4a33">Atrasadas (${atrasadas})</div>` : ''}
      <div class="filtro-btn ${filtroStatus==='concluidas'?'ativo':''}" onclick="setFiltro('concluidas')">Concluídas</div>
    </div>
    <div class="lista-tarefas">
      ${filtradas.length === 0 ? '<div class="vazio">Nenhuma tarefa aqui 🎉</div>' : filtradas.map(t => cardTarefa(t, false)).join('')}
    </div>
  `;
}

function renderGeral() {
  const totalConcluidas = Object.values(tarefas).filter(t => t.status === 'concluida').length;
  let html = `<button class="btn-nova" onclick="abrirModal()">+ Nova tarefa</button>`;
  if (usuarioAtual === 'gustavo' && totalConcluidas > 0) {
    html += `<button class="btn-limpar" onclick="limparConcluidas()">🗑 Limpar concluídas (${totalConcluidas})</button>`;
  }

  for (const u of USUARIOS) {
    const todas = Object.entries(tarefas)
      .map(([id, t]) => ({ id, ...t }))
      .filter(t => t.responsavel === u.id)
      .sort((a, b) => new Date(a.data) - new Date(b.data));

    const pendentes = todas.filter(t => t.status !== 'concluida');
    const concluidas = todas.filter(t => t.status === 'concluida');
    const atrasadas = pendentes.filter(t => isAtrasada(t)).length;

    if (todas.length === 0) continue;

    html += `
      <div class="pessoa-secao">
        <div class="pessoa-header" onclick="entrar('${u.id}')">
          <div class="pessoa-avatar-sm">${iniciais(u.nome)}</div>
          <div class="pessoa-nome-header">${u.nome}</div>
          <span class="badge-contagem">${pendentes.length} pendente${pendentes.length !== 1 ? 's' : ''}</span>
          ${concluidas.length > 0 ? `<span class="badge-contagem" style="background:#1e3a1e;color:#5a9e5a">✓ ${concluidas.length}</span>` : ''}
          ${atrasadas > 0 ? `<span class="badge-contagem badge-atrasada">⚠ ${atrasadas} atrasada${atrasadas > 1 ? 's' : ''}</span>` : ''}
        </div>
        <div class="lista-tarefas">
          ${pendentes.length === 0 && concluidas.length === 0
            ? '<div class="vazio" style="padding:1rem;font-size:13px">Sem tarefas</div>'
            : pendentes.map(t => cardTarefa(t, true)).join('')}
          ${concluidas.length > 0 ? `
            <details style="margin-top:6px">
              <summary style="cursor:pointer;font-size:12px;color:#666;padding:6px 0;list-style:none">
                ▸ ${concluidas.length} concluída${concluidas.length !== 1 ? 's' : ''}
              </summary>
              ${concluidas.map(t => cardTarefa(t, true)).join('')}
            </details>` : ''}
        </div>
      </div>
    `;
  }

  document.getElementById('conteudo').innerHTML = html;
}

function itensOrdenados(userId) {
  const cfg = rotinasConfig[userId] || {};
  return Object.entries(cfg)
    .map(([id, v]) => ({ id, ...v }))
    .sort((a, b) => (a.ordem || 0) - (b.ordem || 0));
}

function renderItemRotina(item, userId, statusHoje, isCeo, draggable = true) {
  const feito = !!statusHoje[item.id];
  return `
    <div class="rotina-item ${feito ? 'feito' : ''}"
      ${draggable ? `draggable="true" data-itemid="${item.id}" data-userid="${userId}"
      ondragstart="dragStart(event)" ondragover="dragOver(event)" ondrop="dragDrop(event)" ondragend="dragEnd(event)"` : ''}
      style="${!draggable ? 'cursor:default' : ''}">
      ${draggable ? `<span class="drag-handle" title="Arrastar">⠿</span>` : ''}
      <div class="rotina-check" onclick="toggleRotina('${userId}','${item.id}',${feito})" style="cursor:pointer${!draggable ? ';cursor:default' : ''}"></div>
      <div onclick="${draggable ? `toggleRotina('${userId}','${item.id}',${feito})` : ''}" style="flex:1;${draggable ? 'cursor:pointer' : 'cursor:default'}">
        <div class="rotina-desc">${item.desc}</div>
        <div class="rotina-periodo">${item.periodo || ''}</div>
      </div>
      ${isCeo ? `
        <button class="btn-editar" onclick="abrirModalRotina('${userId}','${item.id}')" title="Editar">✎</button>
        <button class="btn-excluir" onclick="removerItemRotina('${userId}','${item.id}')">×</button>
      ` : ''}
    </div>`;
}

function renderGruposRotina(itens, userId, statusHoje, isCeo, draggable = true) {
  const semGrupo = itens.filter(i => !i.grupo);
  const grupos = {};
  itens.filter(i => i.grupo).forEach(i => {
    if (!grupos[i.grupo]) grupos[i.grupo] = [];
    grupos[i.grupo].push(i);
  });

  let html = '';

  // itens sem grupo primeiro
  html += semGrupo.map(i => renderItemRotina(i, userId, statusHoje, isCeo, draggable)).join('');

  // grupos colapsáveis
  for (const [nomeGrupo, gitens] of Object.entries(grupos)) {
    const feitosGrupo = gitens.filter(i => statusHoje[i.id]).length;
    const completo = feitosGrupo === gitens.length;
    html += `
      <details class="rotina-grupo" ${completo ? '' : 'open'}>
        <summary class="rotina-grupo-header">
          <span class="rotina-grupo-nome">${nomeGrupo}</span>
          <span class="rotina-grupo-pct ${completo ? 'completo' : ''}">${feitosGrupo}/${gitens.length}${completo ? ' ✓' : ''}</span>
        </summary>
        ${gitens.map(i => renderItemRotina(i, userId, statusHoje, isCeo, draggable)).join('')}
      </details>`;
  }
  return html;
}

function renderRotina() {
  const u = usuario(usuarioAtual);
  const isCeo = usuarioAtual === 'gustavo';
  const isGestor = u.gestor;

  if (isGestor) {
    // ── Visão CEO / gestor: ver todos + gerenciar ──
    const usuariosComRotina = USUARIOS.filter(u => rotinasConfig[u.id] && Object.keys(rotinasConfig[u.id]).length > 0);
    const isHoje = dataRotina === hoje();
    let html = `
      <div style="display:flex;align-items:center;gap:10px;margin-bottom:1.25rem;flex-wrap:wrap">
        ${isCeo ? `<button class="btn-nova" onclick="abrirModalRotina(null, null)">+ Adicionar item de rotina</button>` : ''}
        <div style="display:flex;align-items:center;gap:6px;margin-left:auto">
          <button class="btn-trocar" onclick="navegarData(-1)">‹</button>
          <input type="date" value="${dataRotina}" onchange="mudarDataRotina(this.value)"
            style="background:#1a1a1a;border:1px solid #2a2a2a;color:#f0f0f0;padding:6px 10px;border-radius:6px;font-size:14px">
          <button class="btn-trocar" onclick="navegarData(1)" ${isHoje ? 'disabled style="opacity:0.3"' : ''}>›</button>
          ${!isHoje ? `<button class="btn-trocar" onclick="mudarDataRotina('${hoje()}')">Hoje</button>` : ''}
        </div>
      </div>`;

    if (usuariosComRotina.length === 0) {
      html += '<div class="vazio" style="margin-top:2rem">Nenhuma rotina cadastrada ainda.</div>';
      document.getElementById('conteudo').innerHTML = html;
      return;
    }

    for (const u of usuariosComRotina) {
      const itens = itensOrdenados(u.id);
      const statusHoje = rotinaHoje[u.id] || {};
      const feitos = itens.filter(i => statusHoje[i.id]).length;
      const pct = itens.length ? Math.round((feitos / itens.length) * 100) : 0;
      const completo = itens.length > 0 && feitos === itens.length;

      html += `
        <div class="rotina-pessoa">
          <div class="rotina-pessoa-header">
            <div class="pessoa-avatar-sm">${iniciais(u.nome)}</div>
            <div class="rotina-pessoa-nome">${u.nome}</div>
            <span class="rotina-pct ${completo ? 'completo' : ''}">${feitos}/${itens.length} hoje${completo ? ' ✓' : ''}</span>
            <div class="rotina-barra-wrap" style="max-width:100px"><div class="rotina-barra" style="width:${pct}%"></div></div>
            ${isCeo ? `<button class="btn-limpar" onclick="abrirModalRotina('${u.id}', null)" style="margin-left:auto;font-size:12px">+ Item</button>` : ''}
          </div>
          <div class="rotina-lista" data-userid="${u.id}">
            ${renderGruposRotina(itens, u.id, statusHoje, isCeo, isCeo)}
          </div>
        </div>`;
    }
    document.getElementById('conteudo').innerHTML = html;
    return;
  }

  // ── Visão individual ──
  const itens = itensOrdenados(usuarioAtual);
  if (itens.length === 0) {
    document.getElementById('conteudo').innerHTML = '<div class="vazio">Nenhuma rotina cadastrada para você ainda.</div>';
    return;
  }
  const statusHoje = rotinaHoje[usuarioAtual] || {};
  const feitos = itens.filter(i => statusHoje[i.id]).length;
  const pct = Math.round((feitos / itens.length) * 100);

  let html = `
    <div class="rotina-header">
      <span class="rotina-progresso">${feitos} de ${itens.length} concluídas hoje</span>
      <div class="rotina-barra-wrap"><div class="rotina-barra" style="width:${pct}%"></div></div>
      <span class="rotina-progresso">${pct}%</span>
    </div>
    <div class="rotina-lista" data-userid="${usuarioAtual}">
    ${renderGruposRotina(itens, usuarioAtual, statusHoje, false, true)}
    </div>`;
  document.getElementById('conteudo').innerHTML = html;
}

let dragSrcId = null;
let dragSrcUser = null;

function dragStart(e) {
  dragSrcId = e.currentTarget.dataset.itemid;
  dragSrcUser = e.currentTarget.dataset.userid;
  e.currentTarget.style.opacity = '0.4';
  e.dataTransfer.effectAllowed = 'move';
}

function dragOver(e) {
  e.preventDefault();
  e.dataTransfer.dropEffect = 'move';
  document.querySelectorAll('.rotina-item.drag-over').forEach(el => el.classList.remove('drag-over'));
  const target = e.currentTarget;
  if (target.dataset.itemid !== dragSrcId) target.classList.add('drag-over');
}

function dragEnd(e) {
  e.currentTarget.style.opacity = '';
  document.querySelectorAll('.rotina-item.drag-over').forEach(el => el.classList.remove('drag-over'));
}

function dragDrop(e) {
  e.preventDefault();
  const targetId = e.currentTarget.dataset.itemid;
  const targetUser = e.currentTarget.dataset.userid;
  if (dragSrcId === targetId || dragSrcUser !== targetUser) return;

  const itens = itensOrdenados(targetUser);
  const srcIdx = itens.findIndex(i => i.id === dragSrcId);
  const tgtIdx = itens.findIndex(i => i.id === targetId);
  itens.splice(tgtIdx, 0, itens.splice(srcIdx, 1)[0]);

  const updates = {};
  itens.forEach((item, i) => {
    updates[`rotinas_config/${targetUser}/${item.id}/ordem`] = i + 1;
  });
  DB.ref().update(updates);
}

function toggleRotina(userId, itemId, atual) {
  const path = `${hoje()}/${userId}/${itemId}`;
  if (atual) REF_ROTINA.child(path).remove();
  else REF_ROTINA.child(path).set(true);
}

// ── CRUD ROTINA ──
function abrirModalRotina(userId, itemId) {
  editandoRotinaUser = userId;
  editandoRotinaId = itemId;

  const overlay = document.getElementById('overlay-rotina');
  const titulo = document.getElementById('modal-rotina-titulo');
  const descEl = document.getElementById('r-descricao');
  const perEl = document.getElementById('r-periodo');
  const campoUser = document.getElementById('r-campo-usuario');
  const selUser = document.getElementById('r-usuario');

  if (itemId && userId) {
    // editar item existente
    titulo.textContent = 'Editar Item de Rotina';
    const item = rotinasConfig[userId]?.[itemId] || {};
    descEl.value = item.desc || '';
    perEl.value = item.periodo || '';
    document.getElementById('r-grupo').value = item.grupo || '';
    campoUser.style.display = 'none';
  } else {
    // novo item
    titulo.textContent = 'Novo Item de Rotina';
    descEl.value = '';
    perEl.value = '';
    document.getElementById('r-grupo').value = '';
    // mostrar seletor de usuário se não especificado
    if (!userId) {
      campoUser.style.display = 'block';
      selUser.innerHTML = USUARIOS
        .filter(u => !u.gestor)
        .map(u => `<option value="${u.id}">${u.nome} — ${u.cargo}</option>`)
        .join('');
    } else {
      campoUser.style.display = 'none';
    }
  }

  overlay.classList.add('aberto');
  descEl.focus();
}

function fecharModalRotina() {
  document.getElementById('overlay-rotina').classList.remove('aberto');
  editandoRotinaId = null;
  editandoRotinaUser = null;
}

function salvarItemRotina() {
  const desc = document.getElementById('r-descricao').value.trim();
  const periodo = document.getElementById('r-periodo').value.trim();
  const grupo = document.getElementById('r-grupo').value.trim();
  if (!desc) { alert('Descreva o item.'); return; }

  const userId = editandoRotinaUser || document.getElementById('r-usuario').value;
  const dados = { desc, periodo, ...(grupo ? { grupo } : { grupo: null }) };

  if (editandoRotinaId) {
    REF_CONFIG.child(userId).child(editandoRotinaId).update(dados);
  } else {
    const itens = itensOrdenados(userId);
    const ordem = itens.length + 1;
    REF_CONFIG.child(userId).push({ ...dados, ordem });
  }
  fecharModalRotina();
}

function removerItemRotina(userId, itemId) {
  if (confirm('Remover este item da rotina?')) {
    REF_CONFIG.child(userId).child(itemId).remove();
  }
}

function cardTarefa(t, mostrarResponsavel) {
  const atrasada = isAtrasada(t) && !['concluida','aguardando-aceite'].includes(t.status);
  const hoje = t.data === new Date().toISOString().split('T')[0] && t.status !== 'concluida';
  const criador = usuario(t.criadoPor);
  const resp = usuario(t.responsavel);
  const isCeo = usuarioAtual === 'gustavo';
  const isDono = t.responsavel === usuarioAtual;
  const isAguardando = t.status === 'aguardando-aceite';
  const isDevolvida = t.status === 'devolvida';

  let classCard = 'tarefa-card';
  if (t.status === 'concluida') classCard += ' concluida';
  else if (isAguardando) classCard += ' aguardando';
  else if (isDevolvida) classCard += ' devolvida';
  else if (atrasada) classCard += ' atrasada';
  else if (t.status === 'em-andamento') classCard += ' em-andamento';

  const dataLabel = formatarData(t.data);
  const podeMudarStatus = isDono || isCeo;
  const checkClass = t.status === 'concluida' ? 'concluida' : t.status === 'em-andamento' ? 'em-andamento' : '';
  const podeCheck = podeMudarStatus && !isAguardando && !isDevolvida;

  return `
    <div class="${classCard}" id="card-${t.id}">
      <div class="tarefa-check ${checkClass}"
           onclick="${podeCheck ? `ciclarStatus('${t.id}','${t.status||'a-fazer'}')` : ''}"></div>
      <div class="tarefa-corpo">
        <div class="tarefa-titulo">${t.descricao}</div>
        <div class="tarefa-meta">
          ${isAguardando ? `<span class="tag tag-aguardando">⏳ Aguardando aceite</span>` : ''}
          ${isDevolvida ? `<span class="tag tag-devolvida">↩ Devolvida${resp ? ' por ' + resp.nome : ''}</span>` : ''}
          <span class="tag tag-data ${atrasada ? 'atrasada' : hoje ? 'hoje' : ''}">
            ${atrasada ? '⚠ ' : hoje ? '⏰ ' : '📅 '}${dataLabel}
          </span>
          ${mostrarResponsavel && resp ? `<span class="tag tag-responsavel">→ ${resp.nome}</span>` : ''}
          <span class="tag tag-criado">${criador && criador.id !== t.responsavel ? `por ${criador.nome}` : 'própria'}</span>
          ${isAguardando && isDono ? `<button class="btn-aceitar" onclick="aceitarTarefa('${t.id}')">Aceitar</button><button class="btn-recusar" onclick="recusarTarefa('${t.id}')">Recusar</button>` : ''}
          ${isDevolvida && t.criadoPor === usuarioAtual ? `<button class="tarefa-status-btn" onclick="abrirEdicao('${t.id}')">Reatribuir</button><button class="tarefa-status-btn" onclick="setStatus('${t.id}','a-fazer')">Assumir</button>` : ''}
          ${podeMudarStatus && (t.status === 'a-fazer' || !t.status) ? `<button class="tarefa-status-btn" onclick="setStatus('${t.id}','em-andamento')">Iniciar</button>` : ''}
          ${podeMudarStatus && t.status === 'em-andamento' ? `<button class="tarefa-status-btn" onclick="setStatus('${t.id}','concluida')">Concluir</button>` : ''}
          ${isCeo && t.status === 'concluida' ? `<button class="tarefa-status-btn" onclick="setStatus('${t.id}','a-fazer')">Reabrir</button>` : ''}
        </div>
      </div>
      <div style="display:flex;gap:4px;align-items:center">
        ${isCeo ? `<button class="btn-editar" title="Editar" onclick="abrirEdicao('${t.id}')">✎</button>` : ''}
        ${podeExcluir(t) ? `<button class="btn-excluir" onclick="excluir('${t.id}')">×</button>` : ''}
      </div>
    </div>
  `;
}

// ── LÓGICA ──
function isAtrasada(t) {
  if (!t.data || t.status === 'concluida') return false;
  return t.data < new Date().toISOString().split('T')[0];
}

function podeExcluir(t) {
  return usuarioAtual === 'gustavo' || t.criadoPor === usuarioAtual || !t.criadoPor;
}

let editandoId = null;

function abrirEdicao(id) {
  const t = tarefas[id];
  if (!t) return;
  editandoId = id;
  document.getElementById('modal-titulo').textContent = 'Editar Tarefa';
  document.getElementById('f-descricao').value = t.descricao;
  document.getElementById('f-data').value = t.data;
  const sel = document.getElementById('f-responsavel');
  sel.innerHTML = USUARIOS.map(u =>
    `<option value="${u.id}" ${t.responsavel === u.id ? 'selected' : ''}>${u.nome} — ${u.cargo}</option>`
  ).join('');
  document.getElementById('overlay').classList.add('aberto');
  document.getElementById('f-descricao').focus();
}

function formatarData(data) {
  if (!data) return '';
  const [ano, mes, dia] = data.split('-');
  return `${dia}/${mes}`;
}

function setFiltro(f) {
  filtroStatus = f;
  renderConteudo();
}

function limparConcluidas() {
  if (!confirm('Apagar todas as tarefas concluídas do sistema?')) return;
  Object.entries(tarefas).forEach(([id, t]) => {
    if (t.status === 'concluida') REF.child(id).remove();
  });
}

function aceitarTarefa(id) {
  REF.child(id).update({ status: 'a-fazer' });
}

function recusarTarefa(id) {
  const t = tarefas[id];
  if (!t) return;
  REF.child(id).update({ responsavel: t.criadoPor, status: 'devolvida' });
}

function ciclarStatus(id, statusAtual) {
  const ciclo = { 'a-fazer': 'em-andamento', 'em-andamento': 'concluida', 'concluida': 'a-fazer' };
  const proximo = ciclo[statusAtual] || 'em-andamento';
  REF.child(id).update({ status: proximo });
}

function setStatus(id, status) {
  REF.child(id).update({ status });
}

function excluir(id) {
  if (confirm('Excluir esta tarefa?')) REF.child(id).remove();
}

// ── MODAL ──
function abrirModal(respId) {
  editandoId = null;
  document.getElementById('modal-titulo').textContent = 'Nova Tarefa';
  document.getElementById('f-descricao').value = '';
  document.getElementById('f-data').value = '';

  const sel = document.getElementById('f-responsavel');
  sel.innerHTML = USUARIOS.map(u =>
    `<option value="${u.id}" ${(respId || usuarioAtual) === u.id ? 'selected' : ''}>${u.nome} — ${u.cargo}</option>`
  ).join('');

  document.getElementById('overlay').classList.add('aberto');
  document.getElementById('f-descricao').focus();
}

function fecharModal() {
  editandoId = null;
  document.getElementById('overlay').classList.remove('aberto');
}

function salvarTarefa() {
  const descricao = document.getElementById('f-descricao').value.trim();
  const responsavel = document.getElementById('f-responsavel').value;
  const data = document.getElementById('f-data').value;

  if (!descricao) { alert('Descreva a tarefa.'); return; }
  if (!data) { alert('Informe a data de entrega.'); return; }

  if (editandoId) {
    const t = tarefas[editandoId];
    const mudouResponsavel = t && t.responsavel !== responsavel;
    const update = { descricao, responsavel, data };
    if (mudouResponsavel) update.status = responsavel === usuarioAtual ? 'a-fazer' : 'aguardando-aceite';
    REF.child(editandoId).update(update);
  } else {
    const status = responsavel === usuarioAtual ? 'a-fazer' : 'aguardando-aceite';
    REF.push({ descricao, responsavel, criadoPor: usuarioAtual, data, status, criadoEm: Date.now() });
  }

  fecharModal();
}

// ── INIT ──
renderSelecao();

const salvo = localStorage.getItem('p43_usuario');
if (salvo && USUARIOS.find(u => u.id === salvo)) entrar(salvo);

document.getElementById('overlay').addEventListener('click', e => {
  if (e.target === document.getElementById('overlay')) fecharModal();
});
document.getElementById('overlay-rotina').addEventListener('click', e => {
  if (e.target === document.getElementById('overlay-rotina')) fecharModalRotina();
});
</script>
