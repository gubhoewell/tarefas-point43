async function seed() {
  linha('Limpando dados anteriores...', 'info');
  try {
    await REF.remove();
    linha('Banco limpo. Inserindo ' + TAREFAS.length + ' tarefas...', 'info');
  } catch(e) {
    linha('ERRO ao limpar: ' + e.message, 'err');
    return;
  }

  let ok = 0;
  for (const t of TAREFAS) {
    try {
      await REF.push({ ...t, status: 'a-fazer', criadoEm: Date.now() });
      ok++;
      linha(`✓ [${ok}/${TAREFAS.length}] ${t.responsavel}: ${t.descricao.slice(0, 60)}...`, 'ok');
    } catch(e) {
      linha(`✗ ERRO: ${t.descricao.slice(0,50)} — ${e.message}`, 'err');
    }
  }
  linha('', '');
  linha(`══ Concluído: ${ok}/${TAREFAS.length} tarefas inseridas. ══`, 'info');
  if (ok === TAREFAS.length) {
    linha('Pode fechar esta aba e abrir o sistema de tarefas!', 'ok');
  }
}

async function seedCobertura() {
  if (!confirm('Adiciona 17 itens de cobertura da Emilly na rotina da Júlia, Luana e Gustavo (com expiração em 28/07)?\n\nNÃO apaga as rotinas existentes — só adiciona o grupo.')) return;
  for (const userId of ['julia', 'luana', 'gustavo']) {
    linha(`Adicionando cobertura para ${userId}...`, 'info');
    // Remove cobertura antiga se existir
    const snap = await firebase.database().ref(`rotinas_config/${userId}`).get();
    const atual = snap.val() || {};
    for (const [id, item] of Object.entries(atual)) {
      if (item.grupo === 'Cobertura Emilly') {
        await firebase.database().ref(`rotinas_config/${userId}/${id}`).remove();
      }
    }
    for (const item of COBERTURA_EMILLY) {
      await firebase.database().ref(`rotinas_config/${userId}`).push(item);
    }
    linha(`✓ ${COBERTURA_EMILLY.length} itens de cobertura adicionados para ${userId}`, 'ok');
  }
  linha('Cobertura Emilly configurada! Expira em 28/07/2026.', 'ok');
}
